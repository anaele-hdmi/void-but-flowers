<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Void (But Flowers) - v14</title>
<style>
    :root {
        --glow-green: #33ff33;
        --dim-green: #0a440a;
        --bg-dark: #010401;
        --ui-bg: rgba(5, 15, 5, 0.9);
    }
    body, html {
        margin: 0; padding: 0; width: 100%; height: 100%;
        background-color: var(--bg-dark); color: var(--glow-green);
        font-family: 'Courier New', Courier, monospace; overflow: hidden;
        user-select: none; -webkit-user-select: none;
    }
    canvas { display: block; width: 100vw; height: 100vh; }
    
    .overlay {
        position: fixed; top: 0; left: 0; width: 100%; height: 100%;
        background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.85) 100%);
        pointer-events: none; z-index: 10;
    }
    .crosshair {
        position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
        color: rgba(51, 255, 51, 0.4); font-size: 24px; pointer-events: none; z-index: 15;
    }
    .panel {
        position: fixed; background: var(--ui-bg); border: 1px solid var(--glow-green);
        padding: 12px; backdrop-filter: blur(10px); z-index: 20; box-shadow: 0 0 15px rgba(0,255,0,0.15);
    }
    #system-console { top: 20px; right: 20px; width: 280px; }
    #graph-console { bottom: 20px; right: 20px; width: 280px; }
    
    .panel-header {
        display: flex; justify-content: space-between; border-bottom: 1px solid var(--glow-green);
        margin-bottom: 10px; padding-bottom: 4px; font-size: 0.8rem; font-weight: bold; cursor: pointer;
    }
    .stat-row { display: flex; justify-content: space-between; align-items: center; font-size: 0.75rem; margin: 4px 0; }
    .controls { display: grid; gap: 6px; margin-top: 10px; }
    
    button {
        background: transparent; color: var(--glow-green); border: 1px solid var(--glow-green);
        padding: 6px; cursor: pointer; font-family: inherit; font-size: 0.7rem; transition: 0.2s;
    }
    button:hover, button.active { background: var(--glow-green); color: var(--bg-dark); }
    .btn-act { border-style: dashed; }
    .btn-mvga { font-weight: bold; border-color: #88ff88; color: #88ff88; }
    .btn-mvga.active { background: #88ff88; color: var(--bg-dark); box-shadow: 0 0 10px #88ff88; }
    
    input[type=range] { width: 100%; accent-color: var(--glow-green); margin: 4px 0; }
    .num-input {
        width: 24px; background: transparent; color: var(--glow-green);
        border: 1px solid var(--dim-green); font-family: inherit; font-size: 0.7rem; text-align: center;
    }
    canvas#graphCanvas {
        background: #000; border: 1px solid var(--dim-green); margin-top: 10px; width: 100%; height: 90px;
    }
    .legend-graph { font-size: 0.6rem; color: #88ff88; margin-top: 5px; opacity: 0.7; line-height: 1.3; }

    #audio-toggle { position: fixed; top: 20px; left: 20px; font-size: 24px; cursor: pointer; z-index: 30; opacity: 0.6; }

    .pad-container {
        position: fixed; bottom: 20px; left: 20px; z-index: 30; opacity: 0.5; transition: 0.3s;
    }
    .pad-container:hover { opacity: 1; }
    .pad-label { font-size: 0.6rem; text-align: center; margin-bottom: 5px; color: #555; }
    
    .gamepad { display: grid; grid-template-columns: 40px 40px 40px; gap: 5px; }
    .btn-dir {
        width: 40px; height: 40px; border: 1px solid var(--glow-green); background: rgba(0,255,0,0.1);
        display: flex; flex-direction: column; justify-content: center; align-items: center; 
        cursor: pointer; border-radius: 4px; font-size: 0.7rem;
    }
    .btn-dir:active { background: var(--glow-green); color: var(--bg-dark); }
    .gp-up { grid-column: 2; grid-row: 1; }
    .gp-left { grid-column: 1; grid-row: 2; }
    .gp-down { grid-column: 2; grid-row: 2; }
    .gp-right { grid-column: 3; grid-row: 2; }
    .gamepad-z { position: absolute; bottom: 0; left: 140px; display: flex; flex-direction: column; gap: 5px; }
</style>
</head>
<body>

<div class="overlay"></div>
<div class="crosshair">✛</div>
<div id="audio-toggle">🔈</div>

<div id="system-console" class="panel">
    <div class="panel-header" onclick="toggleDisplay('sys-content')"><span>VOID (BUT FLOWERS)</span><span>_</span></div>
    <div id="sys-content">
        <div class="stat-row"><span>GEN:</span><span id="gen-count">0</span></div>
        <div class="stat-row"><span>POP:</span><span id="pop-count">0</span></div>
        <div class="stat-row" style="margin-top: 8px; padding-top: 8px; border-top: 1px dashed var(--dim-green);">
            <span>RULE (B/S):</span>
            <div style="display:flex; gap:2px; align-items:center;">
                B: <input type="number" id="rule-b-min" value="5" class="num-input">-<input type="number" id="rule-b-max" value="5" class="num-input">
                &nbsp;S: <input type="number" id="rule-s-min" value="4" class="num-input">-<input type="number" id="rule-s-max" value="5" class="num-input">
            </div>
        </div>
        <div class="controls">
            <div style="font-size: 0.6rem; text-align: center; margin-top: 4px;">PULSE RATE (FPS)</div>
            <input type="range" id="speed-range" min="1" max="60" value="15">
            
            <button id="mvga-btn" class="btn-mvga">[ MAKE VOID GREAT AGAIN ]</button>
            <button id="interact-btn" class="btn-act">[ ACT: CAMERA OP. ]</button>
            <button id="cam-mode-btn">[ CAM: ORBIT ]</button>
            <button id="inject-btn">[ RANDOM INJECTION ]</button>
            <button id="clear-btn">[ PURGE VOID ]</button>
            <button id="play-btn">[ PAUSE ]</button>
        </div>
    </div>
</div>

<div id="graph-console" class="panel">
    <div class="panel-header" onclick="toggleDisplay('grp-content')"><span>ANALYTIC RADAR (3D)</span><span>_</span></div>
    <div id="grp-content">
        <canvas id="graphCanvas"></canvas>
        <div class="legend-graph">
            - DENSITY (Solid) &nbsp;- ENTROPY (Dot) <br> - VOLATILITY (Fill) &nbsp;- MEMORY (Bright)
        </div>
    </div>
</div>

<div class="pad-container">
    <div class="pad-label">[ FLY MODE: WASD + QE ]</div>
    <div class="gamepad" id="v-pad">
        <div class="btn-dir gp-up" data-key="w">W</div>
        <div class="btn-dir gp-left" data-key="a">A</div>
        <div class="btn-dir gp-down" data-key="s">S</div>
        <div class="btn-dir gp-right" data-key="d">D</div>
    </div>
    <div class="gamepad-z" id="v-pad-z">
        <div class="btn-dir" data-key="e">E</div>
        <div class="btn-dir" data-key="q">Q</div>
    </div>
</div>

<script type="module">
    import * as THREE from 'https://unpkg.com/three@0.158.0/build/three.module.js';

    const SIZE = 50, TOTAL = SIZE**3, CENTER = SIZE/2;
    let grid = new Uint8Array(TOTAL), nextGrid = new Uint8Array(TOTAL), phosphor = new Float32Array(TOTAL);
    let generation = 0, running = true, cameraMode = 'orbit', interactMode = 'camera', isDragging = false, isInjecting = false;
    let isMVGA = false;
    let history = []; const MAX_HIST = 120;
    let audioCtx = null, isAudioEnabled = false, lastSETime = 0;
    let currentDensity = 0, currentEntropy = 0;

    const elGen = document.getElementById('gen-count'), elPop = document.getElementById('pop-count');
    const gCanvas = document.getElementById('graphCanvas'), gCtx = gCanvas.getContext('2d', {alpha: false});
    const bMinIn = document.getElementById('rule-b-min'), bMaxIn = document.getElementById('rule-b-max');
    const sMinIn = document.getElementById('rule-s-min'), sMaxIn = document.getElementById('rule-s-max');
    const speedRange = document.getElementById('speed-range');

    window.toggleDisplay = (id) => { const el = document.getElementById(id); el.style.display = el.style.display === 'none' ? 'block' : 'none'; };

    const scene = new THREE.Scene(); scene.fog = new THREE.FogExp2(0x010401, 0.015);
    const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
    renderer.setSize(window.innerWidth, window.innerHeight); renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setClearColor(0x010401); document.body.appendChild(renderer.domElement);

    const instancedMesh = new THREE.InstancedMesh(new THREE.BoxGeometry(0.7, 0.7, 0.7), new THREE.MeshBasicMaterial({ color: 0x33ff33, transparent: true, opacity: 0.8, blending: THREE.AdditiveBlending, depthWrite: false }), TOTAL);
    const dummy = new THREE.Object3D(), colorDummy = new THREE.Color();
    for (let i = 0; i < TOTAL; i++) { dummy.scale.set(0,0,0); dummy.updateMatrix(); instancedMesh.setMatrixAt(i, dummy.matrix); }
    scene.add(instancedMesh);

    let orbitTheta = Math.PI/4, orbitPhi = Math.PI/3, orbitRadius = SIZE*1.5, keys = { w:false, a:false, s:false, d:false, q:false, e:false }, prevMouse = { x: 0, y: 0 };
    function resetOrbit() { camera.position.set(orbitRadius*Math.sin(orbitPhi)*Math.cos(orbitTheta), orbitRadius*Math.cos(orbitPhi), orbitRadius*Math.sin(orbitPhi)*Math.sin(orbitTheta)); camera.lookAt(0,0,0); }
    resetOrbit();

    function handlePointer(x, y, down, isUI) {
        if(isUI) return;
        if(down) { if(interactMode==='camera') isDragging=true; else { isInjecting=true; inject(); } }
        else { isDragging=false; isInjecting=false; }
        prevMouse.x = x; prevMouse.y = y;
    }
    window.addEventListener('mousedown', (e) => handlePointer(e.clientX, e.clientY, true, e.target.tagName==='BUTTON'||e.target.tagName==='INPUT'||e.target.classList.contains('btn-dir')));
    window.addEventListener('mousemove', (e) => {
        if(isDragging) {
            const dx = e.clientX-prevMouse.x, dy = e.clientY-prevMouse.y;
            if(cameraMode==='orbit') { orbitTheta-=dx*0.01; orbitPhi-=dy*0.01; orbitPhi=Math.max(0.01, Math.min(Math.PI-0.01, orbitPhi)); resetOrbit(); }
            else { 
                const euler = new THREE.Euler(0,0,0,'YXZ'); 
                euler.setFromQuaternion(camera.quaternion); 
                euler.y-=dx*0.005; euler.x-=dy*0.005; 
                // BUG FIXED: Math.maxとMath.minを正しく組み合わせてピッチを制限
                euler.x = Math.max(-1.5, Math.min(1.5, euler.x)); 
                camera.quaternion.setFromEuler(euler); 
            }
        }
        prevMouse.x = e.clientX; prevMouse.y = e.clientY;
    });
    window.addEventListener('mouseup', () => handlePointer(0,0,false,false));
    window.addEventListener('touchstart', (e) => handlePointer(e.touches[0].clientX, e.touches[0].clientY, true, e.target.tagName==='BUTTON'||e.target.tagName==='INPUT'||e.target.classList.contains('btn-dir')), {passive:false});
    window.addEventListener('touchmove', (e) => { if(isDragging||isInjecting) e.preventDefault(); const dx = e.touches[0].clientX-prevMouse.x, dy = e.touches[0].clientY-prevMouse.y; if(isDragging){ if(cameraMode==='orbit'){ orbitTheta-=dx*0.01; orbitPhi-=dy*0.01; resetOrbit(); } else { const eu = new THREE.Euler(0,0,0,'YXZ'); eu.setFromQuaternion(camera.quaternion); eu.y-=dx*0.005; eu.x-=dy*0.005; eu.x = Math.max(-1.5, Math.min(1.5, eu.x)); camera.quaternion.setFromEuler(eu); } } prevMouse.x=e.touches[0].clientX; prevMouse.y=e.touches[0].clientY; }, {passive:false});
    window.addEventListener('touchend', () => handlePointer(0,0,false,false));
    window.addEventListener('keydown', (e) => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = true; });
    window.addEventListener('keyup', (e) => { if(keys.hasOwnProperty(e.key.toLowerCase())) keys[e.key.toLowerCase()] = false; });
    document.querySelectorAll('.btn-dir').forEach(btn => { btn.addEventListener('mousedown', () => keys[btn.dataset.key]=true); btn.addEventListener('mouseup', () => keys[btn.dataset.key]=false); btn.addEventListener('touchstart', (e) => { e.preventDefault(); keys[btn.dataset.key]=true; }); btn.addEventListener('touchend', (e) => { e.preventDefault(); keys[btn.dataset.key]=false; }); });

    const getI = (x,y,z) => x + y*SIZE + z*SIZE*SIZE;
    
    function inject() {
        if(!isInjecting) return;
        const ray = new THREE.Raycaster(); ray.setFromCamera(new THREE.Vector2(0,0), camera);
        const target = new THREE.Vector3(); ray.ray.at(20, target);
        const cx = Math.floor(target.x+CENTER), cy = Math.floor(target.y+CENTER), cz = Math.floor(target.z+CENTER);
        for(let dz=-4; dz<=4; dz++) for(let dy=-4; dy<=4; dy++) for(let dx=-4; dx<=4; dx++) {
            if(dx*dx+dy*dy+dz*dz <= 16 && Math.random()>0.85) {
                // トーラス境界を適用したシーディング
                const nx = (cx+dx+SIZE)%SIZE, ny = (cy+dy+SIZE)%SIZE, nz = (cz+dz+SIZE)%SIZE;
                const i = getI(nx,ny,nz); grid[i] = 1; phosphor[i] = 1.0;
            }
        }
    }
    
    function randomClusters() {
        for(let c=0; c<12; c++) {
            const cx = Math.floor(Math.random()*SIZE), cy = Math.floor(Math.random()*SIZE), cz = Math.floor(Math.random()*SIZE);
            for(let dz=-3; dz<=3; dz++) for(let dy=-3; dy<=3; dy++) for(let dx=-3; dx<=3; dx++) {
                if(dx*dx+dy*dy+dz*dz <= 9 && Math.random()>0.75) {
                    const nx = (cx+dx+SIZE)%SIZE, ny = (cy+dy+SIZE)%SIZE, nz = (cz+dz+SIZE)%SIZE;
                    const i = getI(nx,ny,nz); grid[i] = 1; phosphor[i] = 1.0;
                }
            }
        }
    }

    function runAutoPilot() {
        if (!isMVGA) return;
        
        // MVGA強化: 全滅を防ぐためのランダムインジェクションを強化
        if (currentDensity < 0.05 && currentEntropy < 0.2) {
            randomClusters();
            if (currentDensity < 0.01) randomClusters(); // 深刻な過疎の場合は2倍注入
            return;
        }
        
        if (currentEntropy < 0.1 && Math.random() > 0.5) {
            let bM = parseInt(bMinIn.value);
            bMinIn.value = bM === 5 ? 4 : 5; 
        }
    }

    function update() {
        let pop = 0, vol = 0, totalP = 0;
        const bM = parseInt(bMinIn.value), bX = parseInt(bMaxIn.value), sM = parseInt(sMinIn.value), sX = parseInt(sMaxIn.value);
        
        const capacityStress = Math.max(0, (currentDensity - 0.20) / 0.10); 
        const deathProb = Math.min(0.8, capacityStress * 0.8);

        // トーラス境界（端をループさせる）ため、0 から SIZE まで回す
        for(let z=0; z<SIZE; z++) for(let y=0; y<SIZE; y++) for(let x=0; x<SIZE; x++) {
            let n = 0; const i = getI(x,y,z);
            for(let dz=-1; dz<=1; dz++) for(let dy=-1; dy<=1; dy++) for(let dx=-1; dx<=1; dx++) { 
                if(dx===0&&dy===0&&dz===0) continue; 
                // 座標をループさせて近傍を取得（循環宇宙）
                const nx = (x+dx+SIZE)%SIZE;
                const ny = (y+dy+SIZE)%SIZE;
                const nz = (z+dz+SIZE)%SIZE;
                n+=grid[getI(nx,ny,nz)]; 
            }
            const state = grid[i]; let next = 0;
            
            if(state===1 && (n>=sM && n<=sX)) next=1; 
            else if(state===0 && (n>=bM && n<=bX)) next=1;
            
            if(next === 1 && Math.random() < deathProb) next = 0;

            if(state!==next) vol++; nextGrid[i]=next;
            if(next===1) { phosphor[i]=1.0; pop++; } else phosphor[i]*=0.88;
            totalP += phosphor[i];
        }
        
        grid.set(nextGrid); generation++; elGen.innerText=generation; elPop.innerText=pop;
        
        currentDensity = pop/TOTAL;
        const p1 = currentDensity, ent = -((p1>0?p1*Math.log2(p1):0)+((1-p1)>0?(1-p1)*Math.log2(1-p1):0));
        currentEntropy = ent;

        history.push({ d: p1, e: ent, v: vol/TOTAL, m: totalP/TOTAL });
        if(history.length>MAX_HIST) history.shift();
        if(isAudioEnabled && pop>0 && Date.now()-lastSETime>200) { playSE(vol); lastSETime=Date.now(); }

        if (generation % 60 === 0) runAutoPilot();
    }

    function playSE(v) {
        const osc = audioCtx.createOscillator(), g = audioCtx.createGain(), p = audioCtx.createPanner();
        p.panningModel='HRTF'; p.positionX.setValueAtTime((Math.random()-0.5)*10, audioCtx.currentTime);
        osc.connect(g); g.connect(p); p.connect(audioCtx.destination);
        osc.frequency.setValueAtTime(110 + Math.random()*440, audioCtx.currentTime);
        g.gain.setValueAtTime(0, audioCtx.currentTime); g.gain.linearRampToValueAtTime(0.05, audioCtx.currentTime+0.1); g.gain.linearRampToValueAtTime(0, audioCtx.currentTime+0.8);
        osc.start(); osc.stop(audioCtx.currentTime+0.8);
    }

    function draw() {
        for(let i=0; i<TOTAL; i++) {
            const p = phosphor[i];
            if(p>0.05) {
                const x=i%SIZE, y=Math.floor(i/SIZE)%SIZE, z=Math.floor(i/(SIZE*SIZE));
                dummy.position.set(x-CENTER, y-CENTER, z-CENTER); dummy.scale.set(0.2+p*0.8, 0.2+p*0.8, 0.2+p*0.8); dummy.updateMatrix(); instancedMesh.setMatrixAt(i, dummy.matrix);
                colorDummy.setHex(Math.floor(p*255)<<8); instancedMesh.setColorAt(i, colorDummy);
            } else { dummy.scale.set(0,0,0); dummy.updateMatrix(); instancedMesh.setMatrixAt(i, dummy.matrix); }
        }
        instancedMesh.instanceMatrix.needsUpdate=true; if(instancedMesh.instanceColor) instancedMesh.instanceColor.needsUpdate=true;
        
        gCanvas.width=gCanvas.offsetWidth; gCanvas.height=gCanvas.offsetHeight;
        gCtx.fillStyle='#000'; gCtx.fillRect(0,0,gCanvas.width, gCanvas.height);
        if(history.length<2) return;
        gCtx.globalCompositeOperation='lighter'; const w=gCanvas.width, h=gCanvas.height, s=w/MAX_HIST;
        gCtx.fillStyle='rgba(20,100,20,0.4)'; gCtx.beginPath(); gCtx.moveTo(0,h); history.forEach((d,i)=>gCtx.lineTo(i*s, h-d.v*3000)); gCtx.lineTo(w,h); gCtx.fill();
        gCtx.strokeStyle='rgba(0,150,0,0.8)'; gCtx.setLineDash([2,4]); gCtx.beginPath(); history.forEach((d,i)=>i===0?gCtx.moveTo(0,h-d.e*100):gCtx.lineTo(i*s,h-d.e*100)); gCtx.stroke(); gCtx.setLineDash([]);
        gCtx.strokeStyle='#33ff33'; gCtx.lineWidth=1.5; gCtx.beginPath(); history.forEach((d,i)=>i===0?gCtx.moveTo(0,h-d.d*4000):gCtx.lineTo(i*s,h-d.d*4000)); gCtx.stroke();
        gCtx.strokeStyle='#aaffaa'; gCtx.lineWidth=0.5; gCtx.beginPath(); history.forEach((d,i)=>i===0?gCtx.moveTo(0,h-d.m*4000):gCtx.lineTo(i*s,h-d.m*4000)); gCtx.stroke();
    }

    // 5. EVENTS
    document.getElementById('audio-toggle').addEventListener('click', () => { if(!audioCtx) audioCtx=new AudioContext(); isAudioEnabled=!isAudioEnabled; if(isAudioEnabled){ audioCtx.resume(); document.getElementById('audio-toggle').innerText='🔊'; } else { audioCtx.suspend(); document.getElementById('audio-toggle').innerText='🔈'; } });
    document.getElementById('interact-btn').addEventListener('click', (e) => { interactMode=interactMode==='camera'?'spray':'camera'; e.target.innerText=interactMode==='camera'?'[ ACT: CAMERA OP. ]':'[ ACT: SPRAY SEEDS ]'; e.target.style.background=interactMode==='camera'?'transparent':'var(--glow-green)'; e.target.style.color=interactMode==='camera'?'var(--glow-green)':'var(--bg-dark)'; });
    document.getElementById('cam-mode-btn').addEventListener('click', (e) => { cameraMode=cameraMode==='orbit'?'fly':'orbit'; e.target.innerText=cameraMode==='orbit'?'[ CAM: ORBIT ]':'[ CAM: FLY ]'; if(cameraMode==='orbit') resetOrbit(); });
    document.getElementById('mvga-btn').addEventListener('click', (e) => { isMVGA=!isMVGA; e.target.classList.toggle('active'); });
    document.getElementById('inject-btn').addEventListener('click', randomClusters);
    document.getElementById('play-btn').addEventListener('click', (e) => { running=!running; e.target.innerText=running?'[ PAUSE ]':'[ PLAY ]'; });
    document.getElementById('clear-btn').addEventListener('click', () => { grid.fill(0); phosphor.fill(0); generation=0; history=[]; draw(); });

    let lt = 0;
    function anim(t) {
        requestAnimationFrame(anim);
        if(cameraMode==='fly'){ const sp=0.6, v=new THREE.Vector3(); if(keys.w)v.z-=sp; if(keys.s)v.z+=sp; if(keys.a)v.x-=sp; if(keys.d)v.x+=sp; if(keys.e)v.y+=sp; if(keys.q)v.y-=sp; v.applyQuaternion(camera.quaternion); camera.position.add(v); }
        if(isInjecting) inject();
        
        const currentSpeed = speedRange ? speedRange.value : 15;
        const fpsInterval = 1000 / currentSpeed;
        
        if(running && t-lt > fpsInterval) { update(); draw(); lt=t; }
        renderer.render(scene, camera);
    }
    randomClusters(); anim(0);
</script>
</body>
</html>
